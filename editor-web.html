<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de contenidos — PROLOPE</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--azul:#1a3a5c;--dorado:#c8a45a;--crema:#faf8f4;--texto:#333;--borde:#d5cfc5;--bg:#fff;--sombra:rgba(0,0,0,.06);--rojo:#c44;--verde:#2a7d4f}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'EB Garamond',Georgia,serif;background:#eae6df;color:var(--texto);line-height:1.6;display:flex;height:100vh;overflow:hidden}

    /* ── SIDEBAR NAV ──────────────────── */
    .ed-nav{width:260px;min-width:260px;background:var(--azul);color:#fff;display:flex;flex-direction:column;overflow:hidden}
    .ed-nav-header{padding:1rem 1rem .5rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
    .ed-nav-header h1{font-family:'Raleway',sans-serif;font-size:1rem;font-weight:600}
    .ed-nav-header p{font-size:.75rem;opacity:.6;margin-top:.2rem}
    .ed-nav-list{flex:1;overflow-y:auto;padding:.5rem 0}
    .nav-group{padding:.3rem 0}
    .nav-group-title{font-family:'Raleway',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.4rem 1rem .2rem;opacity:.45}
    .nav-item{display:block;padding:.35rem 1rem;font-size:.82rem;color:rgba(255,255,255,.75);cursor:pointer;transition:background .15s;text-decoration:none;border:none;background:none;width:100%;text-align:left;font-family:'EB Garamond',serif}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-item.active{background:var(--dorado);color:#fff;font-weight:600}

    /* ── MAIN AREA ────────────────────── */
    .ed-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .ed-topbar{background:var(--bg);border-bottom:1px solid var(--borde);padding:.6rem 1.5rem;display:flex;align-items:center;gap:.8rem;flex-shrink:0}
    .ed-topbar-title{font-family:'Raleway',sans-serif;font-weight:600;color:var(--azul);font-size:.95rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ed-topbar-badge{font-size:.68rem;font-family:'Raleway',sans-serif;background:var(--crema);border:1px solid var(--borde);padding:.15rem .5rem;border-radius:3px;color:#888}
    .ed-body{flex:1;overflow-y:auto;padding:1.5rem 2rem 3rem}

    /* welcome */
    .welcome{text-align:center;padding:4rem 1rem}
    .welcome h2{font-family:'Raleway',sans-serif;color:var(--azul);margin-bottom:.5rem}
    .welcome p{color:#888;max-width:400px;margin:0 auto}

    /* ── SECTIONS ─────────────────────── */
    .ed-section{background:var(--bg);border:1px solid var(--borde);border-radius:8px;padding:1.4rem 1.6rem;margin-bottom:1rem;box-shadow:0 2px 6px var(--sombra)}
    .ed-section h2{font-family:'Raleway',sans-serif;font-size:1rem;font-weight:600;color:var(--azul);margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid var(--dorado);display:flex;align-items:center;gap:.5rem}
    .ed-section h2 .badge{font-size:.65rem;font-weight:700;letter-spacing:.04em;background:var(--dorado);color:#fff;padding:.1rem .45rem;border-radius:3px}

    /* ── FORM FIELDS ──────────────────── */
    label{display:block;font-family:'Raleway',sans-serif;font-weight:500;font-size:.82rem;color:var(--azul);margin:0 0 .2rem}
    .field{margin-bottom:.8rem}
    .field:last-child{margin-bottom:0}
    .help{font-size:.75rem;color:#999;margin-bottom:.2rem}
    input[type=text],select,textarea{width:100%;padding:.45rem .6rem;font-family:'EB Garamond',serif;font-size:.92rem;border:1px solid var(--borde);border-radius:5px;background:var(--crema);color:var(--texto);transition:border-color .2s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--dorado);box-shadow:0 0 0 2px rgba(200,164,90,.18)}
    textarea{resize:vertical;min-height:70px}

    /* ── RICH EDITOR (contenteditable) ── */
    .rich-wrap{border:1px solid var(--borde);border-radius:5px;overflow:hidden}
    .rich-toolbar{display:flex;gap:1px;background:var(--borde);padding:0;border-bottom:1px solid var(--borde)}
    .rich-toolbar button{background:var(--crema);border:none;padding:.3rem .6rem;cursor:pointer;font-family:'Raleway',sans-serif;font-size:.75rem;color:var(--azul);transition:background .12s;flex-shrink:0}
    .rich-toolbar button:hover{background:#e8e2d6}
    .rich-toolbar button.active{background:var(--dorado);color:#fff}
    .rich-edit{min-height:60px;padding:.5rem .65rem;background:var(--crema);font-family:'EB Garamond',serif;font-size:.95rem;line-height:1.6;color:var(--texto);outline:none}
    .rich-edit:focus{background:#fff}
    .rich-edit p{margin-bottom:.6em}
    .rich-edit a{color:var(--azul);text-decoration:underline}

    /* ── BUTTONS ──────────────────────── */
    .btn{display:inline-flex;align-items:center;gap:.3rem;padding:.45rem .9rem;border:none;border-radius:5px;cursor:pointer;font-family:'Raleway',sans-serif;font-size:.8rem;font-weight:500;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-primary{background:var(--dorado);color:#fff}
    .btn-blue{background:var(--azul);color:#fff}
    .btn-green{background:var(--verde);color:#fff}
    .btn-danger{background:var(--rojo);color:#fff}
    .btn-outline{background:none;border:1px solid var(--borde);color:var(--azul)}
    .btn-sm{padding:.3rem .6rem;font-size:.75rem}

    /* ── ITEM CARDS (tesis, congresos…) ─ */
    .item-card{border:1px solid var(--borde);border-radius:6px;padding:1rem 1.2rem 1rem 2.4rem;margin-bottom:.7rem;background:var(--crema);position:relative}
    .item-card.drag-over{border-color:var(--azul);background:#eef3fb}
    .drag-handle{position:absolute;left:.4rem;top:50%;transform:translateY(-50%);cursor:grab;color:#bbb;font-size:1.1rem;line-height:1;user-select:none;padding:.2rem}
    .drag-handle:active{cursor:grabbing}
    .item-card-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
    .item-card-header strong{font-family:'Raleway',sans-serif;font-size:.88rem;flex:1}
    .item-card .row{display:flex;gap:.6rem}
    .item-card .row>div{flex:1}
    .item-card .btn-del-item{position:absolute;top:.5rem;right:.5rem;background:var(--rojo);color:#fff;border:none;border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}

    /* ── IMAGE PICKER ─────────────────── */
    .img-picker{display:flex;gap:.6rem;align-items:flex-end}
    .img-picker input{flex:1}
    .img-picker button{flex-shrink:0}
    .img-upload-btn{flex-shrink:0;cursor:pointer}
    .img-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;align-items:center;justify-content:center}
    .img-modal-overlay.open{display:flex}
    .img-modal{background:var(--bg);border-radius:10px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
    .img-modal-header{padding:1rem;border-bottom:1px solid var(--borde);display:flex;align-items:center;gap:.5rem}
    .img-modal-header input{flex:1}
    .img-modal-header button{flex-shrink:0}
    .img-modal-grid{flex:1;overflow-y:auto;padding:.8rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem}
    .img-modal-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
    .img-modal-grid img:hover{border-color:var(--dorado)}

    /* ── BLOCK CARDS ──────────────────── */
    .block-card{background:var(--bg);border:1px solid var(--borde);border-radius:8px;padding:.8rem 1rem;margin-bottom:.6rem;box-shadow:0 1px 3px var(--sombra)}
    .block-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem}
    .block-handle{color:#ccc;cursor:grab;font-size:1rem}
    .block-type{font-family:'Raleway',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.04em;padding:.1rem .4rem;border-radius:3px;color:#fff;text-transform:uppercase}
    .type-p{background:var(--azul)}.type-h{background:var(--dorado)}.type-fig{background:#5a7d5a}.type-quote{background:#7a6f60}.type-links{background:#6a5a8a}
    .block-actions{margin-left:auto;display:flex;gap:.2rem}
    .block-actions button{background:none;border:1px solid var(--borde);border-radius:3px;width:24px;height:24px;cursor:pointer;font-size:.78rem;display:flex;align-items:center;justify-content:center;color:var(--azul)}
    .block-actions button:hover{background:var(--crema)}
    .block-actions .del{color:var(--rojo)}

    /* ── TOAST ────────────────────────── */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.7rem 1.2rem;border-radius:8px;font-family:'Raleway',sans-serif;font-size:.85rem;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s;z-index:1000}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.ok{background:var(--verde)}.toast.err{background:var(--rojo)}.toast.info{background:var(--azul)}

    /* ── LINK PAIRS ──────────────────── */
    .link-row{display:flex;gap:.4rem;margin-bottom:.4rem;align-items:center}
    .link-row input{flex:1}
    .link-row .del-link{background:var(--rojo);color:#fff;border:none;border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:.9rem;flex-shrink:0}

    /* ── RESPONSIVE ──────────────────── */
    @media(max-width:800px){.ed-nav{width:200px;min-width:200px} .ed-body{padding:1rem} .item-card .row{flex-direction:column;gap:0}}
    @media(max-width:600px){.ed-nav{display:none} .ed-body{padding:.8rem}}
  </style>
</head>
<body>

<!-- ═══════ LEFT NAV ═══════ -->
<aside class="ed-nav">
  <div class="ed-nav-header">
    <h1>PROLOPE</h1>
    <p>Editor de contenidos</p>
  </div>
  <div class="ed-nav-list" id="navList">
    <p style="padding:1rem;font-size:.82rem;opacity:.5">Cargando páginas…</p>
  </div>
</aside>

<!-- ═══════ MAIN ═══════ -->
<div class="ed-main">
  <div class="ed-topbar" id="topbar" style="display:none">
    <span class="ed-topbar-title" id="topTitle"></span>
    <span class="ed-topbar-badge" id="topBadge"></span>
    <button class="btn btn-outline btn-sm" onclick="previewPage()">Vista previa</button>
    <button class="btn btn-green" id="btnSave" onclick="savePage()">Guardar cambios</button>
  </div>
  <div class="ed-body" id="edBody">
    <div class="welcome" id="welcomeScreen">
      <h2>Editor de contenidos PROLOPE</h2>
      <p>Selecciona una página del panel de la izquierda para empezar a editarla.</p>
    </div>
  </div>
</div>

<!-- ═══════ IMAGE PICKER MODAL ═══════ -->
<div class="img-modal-overlay" id="imgModal">
  <div class="img-modal">
    <div class="img-modal-header">
      <input type="text" id="imgSearch" placeholder="Buscar imagen…" oninput="filterImages()">
      <button class="btn btn-outline btn-sm" onclick="closeImgModal()">Cerrar</button>
    </div>
    <div class="img-modal-grid" id="imgGrid"></div>
  </div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>


<script>
/* ══════════════════════════════════════════════════════════════════════════════
   EDITOR DE CONTENIDOS PROLOPE — JAVASCRIPT PRINCIPAL
   ══════════════════════════════════════════════════════════════════════════════ */

// ── STATE ────────────────────────────────────────────────────────────────────
var S = {
  pages: [],
  media: [],
  currentPath: '',
  originalHtml: '',
  headerPart: '',
  footerPart: '',
  pageType: '',
  heroData: null,
  heroOriginalHtml: '',
  blocks: [],
  sidebarHtml: '',
  hasSidebar: false,
  sidebarTag: 'aside',
  sidebarAttrs: '',
  wrapperOpen: '',
  wrapperClose: '',
  mainTag: '',
  mainAttrs: '',
  pageTitle: '',
  // Specialized data
  items: [],       // for tesis, congresos, seminarios, multimedia, members, projects
  introHtml: '',   // intro text before items
  afterGridHtml: '',
  newsEntry: null, // matching noticias-data.js entry for current news page
  newsFormData: null, // parsed form data for existing news editor
};
var blockId = 0;
var imgPickerCallback = null;
var NC = { blockId: 0, cats: [] }; // news creation state

// ── INIT ─────────────────────────────────────────────────────────────────────
(async function init() {
  try {
    var r = await fetch('/api/pages');
    S.pages = await r.json();
    r = await fetch('/api/media');
    S.media = await r.json();
  } catch(e) {
    S.pages = [];
    S.media = [];
  }
  renderNav();
})();

// ── NAV ──────────────────────────────────────────────────────────────────────
function renderNav() {
  var groups = {};
  var labels = {'(raíz)':'Inicio','el-grupo':'El grupo','objetivos':'Objetivos','publicaciones':'Publicaciones','proyectos-digitales':'Proyectos digitales','formacion':'Formación','eventos':'Eventos','multimedia':'Multimedia','noticias':'Noticias'};
  S.pages.forEach(function(p){
    var g = p.dir;
    if (!groups[g]) groups[g] = [];
    groups[g].push(p);
  });
  var html = '';
  var order = ['(raíz)','el-grupo','objetivos','publicaciones','proyectos-digitales','formacion','eventos','multimedia','noticias'];
  order.forEach(function(g){
    if (!groups[g]) return;
    html += '<div class="nav-group"><div class="nav-group-title">'+(labels[g]||g)+'</div>';
    groups[g].forEach(function(p){
      if (g === 'noticias' && /^noticia-/.test(p.name)) return; // individual news handled by manager
      var name = p.name.replace('.html','').replace(/-/g,' ');
      name = name.charAt(0).toUpperCase()+name.slice(1);
      html += '<button class="nav-item" data-path="'+p.path+'" onclick="loadPage(\''+p.path+'\')">'+esc(name)+'</button>';
    });
    if (g === 'noticias') {
      html += '<button class="nav-item" data-path="__news_manager__" onclick="loadNewsManager()">Ver todas las noticias</button>';
      html += '<button class="nav-item" style="color:rgba(200,164,90,.85)" data-path="__new_news__" onclick="loadNewNews()">+ Nueva noticia</button>';
    }
    html += '</div>';
  });
  html += '<div class="nav-group"><div class="nav-group-title">Herramientas</div>';
  html += '<button class="nav-item" data-path="__recursos__" onclick="loadRecursos()">Recursos multimedia</button>';
  html += '</div>';
  document.getElementById('navList').innerHTML = html;
}

// ── LOAD PAGE ────────────────────────────────────────────────────────────────
async function loadPage(pagePath) {
  // Highlight nav
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.toggle('active', el.dataset.path === pagePath); });
  document.getElementById('topbar').style.display = '';
  var _ws = document.getElementById('welcomeScreen'); if (_ws) _ws.style.display = 'none';

  try {
    var r = await fetch('/api/page?path='+encodeURIComponent(pagePath));
    S.originalHtml = await r.text();
  } catch(e) {
    toast('Error al cargar la página','err');
    return;
  }

  S.currentPath = pagePath;
  S.newsEntry = null;
  parseFile(S.originalHtml, pagePath);
  if (S.pageType === 'news') await loadNewsEntry(pagePath);
  renderEditor();
  document.getElementById('edBody').scrollTop = 0;
}

// ── PAGE TYPE DETECTION ──────────────────────────────────────────────────────
function detectType(path) {
  if (path === 'index.html') return 'index';
  if (path === 'formacion/tesis.html') return 'theses';
  if (path === 'eventos/congresos.html') return 'congresses';
  if (path === 'eventos/seminarios.html') return 'seminars';
  if (path === 'multimedia/multimedia.html') return 'multimedia';
  if (path === 'el-grupo/miembros.html') return 'members';
  if (path === 'el-grupo/historial-proyectos.html') return 'projects';
  if (path === 'el-grupo/contacto.html') return 'contact';
  if (path === 'publicaciones/partes-comedias.html') return 'partes';
  if (path.startsWith('noticias/noticia-')) return 'news';
  return 'article';
}

var TYPE_LABELS = {index:'Página de inicio',theses:'Tesis',congresses:'Congresos',seminars:'Seminarios',multimedia:'Multimedia',members:'Miembros',projects:'Historial de proyectos',contact:'Contacto',news:'Noticia',partes:'Partes de comedias',article:'Página de contenido'};

// ── PARSE FILE ───────────────────────────────────────────────────────────────
function parseFile(html, path) {
  blockId = 0;
  S.blocks = []; S.items = []; S.introHtml = ''; S.afterGridHtml = '';
  S.hasSidebar = false; S.sidebarHtml = '';
  S.wrapperOpen = ''; S.wrapperClose = '';
  S.mainTag = ''; S.mainAttrs = '';
  S.heroData = null; S.heroOriginalHtml = '';

  S.pageType = detectType(path);

  // Split header / content / footer
  splitHtml(html);

  // Page title
  var m = S.headerPart.match(/<title>([\s\S]*?)<\/title>/i);
  S.pageTitle = m ? m[1].trim() : '';

  // Parse content zone into DOM
  var doc = new DOMParser().parseFromString('<div id="__cz__">'+S.footerPart_raw+'</div>','text/html');
  // Actually parse the content zone
  doc = new DOMParser().parseFromString('<div id="__cz__">'+S.contentZone+'</div>','text/html');
  var cz = doc.getElementById('__cz__');

  // Hero
  var heroEl = cz.querySelector('.page-hero, .article-hero, .idx-hero');
  if (heroEl) {
    S.heroOriginalHtml = heroEl.outerHTML;
    S.heroData = extractHero(heroEl);
  }

  // Find main content + sidebar + wrapper
  var mainEl = cz.querySelector('.article-main') || cz.querySelector('.article-body') || cz.querySelector('.page-content') || cz.querySelector('.page-content-full');
  var sidebarEl = cz.querySelector('.article-sidebar') || cz.querySelector('aside');
  if (sidebarEl) { S.hasSidebar = true; S.sidebarHtml = sidebarEl.innerHTML; S.sidebarTag = sidebarEl.tagName.toLowerCase(); S.sidebarAttrs = getAttrs(sidebarEl); }

  var _mainContainer = null;
  if (mainEl) {
    var wr = mainEl.parentElement;
    if (wr && wr.id !== '__cz__') { S.wrapperOpen = openTag(wr); S.wrapperClose = '</'+wr.tagName.toLowerCase()+'>'; _mainContainer = wr; }
    else { _mainContainer = mainEl; }
    S.mainTag = mainEl.tagName.toLowerCase(); S.mainAttrs = getAttrs(mainEl);
    parseMain(mainEl);
  } else {
    var gm = cz.querySelector('main');
    if (gm) {
      S.mainTag = 'main'; S.mainAttrs = getAttrs(gm);
      var wr = gm.parentElement;
      if (wr && wr.id !== '__cz__') { S.wrapperOpen = openTag(wr); S.wrapperClose = '</'+wr.tagName.toLowerCase()+'>'; _mainContainer = wr; }
      else { _mainContainer = gm; }
      parseMain(gm);
    }
  }
  // Capture any content after the main container (e.g. modal overlays)
  if (_mainContainer) {
    var _afterHtml = '';
    var _sib = _mainContainer.nextSibling;
    while (_sib) {
      if (_sib.outerHTML !== undefined) _afterHtml += _sib.outerHTML;
      else if (_sib.nodeType === 3 && _sib.textContent.trim()) _afterHtml += _sib.textContent;
      _sib = _sib.nextSibling;
    }
    S.afterGridHtml = _afterHtml.trim();
  }
  // After afterGridHtml is set, enrich congress items with modal data
  if (S.pageType === 'congresses') enrichCongressItems();
}

function splitHtml(html) {
  var hi = html.indexOf('</header>');
  if (hi === -1) { S.headerPart = ''; S.contentZone = html; S.footerPart = ''; return; }
  hi += 9;
  var fi = -1;
  ['<!-- FUNDERS -->','<section class="funders">','<!-- FOOTER -->','<footer>'].forEach(function(mk){
    var idx = html.indexOf(mk, hi);
    if (idx !== -1 && (fi === -1 || idx < fi)) fi = idx;
  });
  S.headerPart = html.substring(0, hi);
  S.contentZone = fi !== -1 ? html.substring(hi, fi) : html.substring(hi);
  S.footerPart = fi !== -1 ? html.substring(fi) : '';
}

function extractHero(el) {
  var h1 = el.querySelector('h1');
  var bc = el.querySelector('.breadcrumb, .article-breadcrumb, .page-hero-breadcrumb');
  var d = {
    title: h1 ? h1.innerHTML.trim() : '',
    breadcrumbLast: '',
    catBadge: (el.querySelector('.article-cat-badge')||{}).textContent||'',
    date: (el.querySelector('.article-date')||{}).textContent||'',
    subtitle: (el.querySelector('.idx-hero-sub')||{}).textContent||'',
    type: el.classList.contains('article-hero') ? 'article' : el.classList.contains('idx-hero') ? 'index' : 'page',
  };
  if (bc) {
    var nodes = bc.childNodes;
    for (var i=nodes.length-1;i>=0;i--) {
      if (nodes[i].nodeType===3 && nodes[i].textContent.trim()) { d.breadcrumbLast=nodes[i].textContent.trim(); break; }
    }
  }
  return d;
}

function parseMain(mainEl) {
  var type = S.pageType;

  // Specialized parsing
  if (type === 'theses') return parseTheses(mainEl);
  if (type === 'congresses') return parseCongresses(mainEl);
  if (type === 'seminars') return parseSeminars(mainEl);
  if (type === 'multimedia') return parseMultimedia(mainEl);
  if (type === 'members') return parseMembers(mainEl);
  if (type === 'projects') return parseProjects(mainEl);
  if (type === 'news') return parseNews(mainEl);
  if (type === 'partes') return parsePartes(mainEl);

  // Generic: parse into blocks
  Array.from(mainEl.children).forEach(function(el) { S.blocks.push(makeBlock(el)); });
}

function parsePartes(mainEl) {
  var introEl = mainEl.querySelector('.intro-text');
  S.introHtml = introEl ? introEl.innerHTML : '';
  var searchWrap = mainEl.querySelector('.search-bar-wrap');
  S.partesSearchHtml = searchWrap ? searchWrap.outerHTML : '';
  var noResultsEl = mainEl.querySelector('.no-results');
  S.partesNoResultsHtml = noResultsEl ? noResultsEl.outerHTML : '';
  S.partesData = [];
  // Find the full PARTES array using bracket counting
  var startTag = S.footerPart.indexOf('const PARTES =');
  if (startTag === -1) startTag = S.footerPart.search(/const\s+PARTES\s*=/);
  if (startTag !== -1) {
    var arrStart = S.footerPart.indexOf('[', startTag);
    if (arrStart !== -1) {
      var depth = 0, i = arrStart, partesStr = '';
      while (i < S.footerPart.length) {
        var ch = S.footerPart[i];
        if (ch === '[') depth++;
        else if (ch === ']') { depth--; if (depth === 0) { partesStr = S.footerPart.slice(arrStart, i+1); break; } }
        i++;
      }
      if (partesStr) {
        try { S.partesData = (new Function('return ' + partesStr))(); } catch(e) { console.error('Error parsing PARTES', e); }
      }
    }
  }
}

function parseNews(mainEl) {

  f.evTitulo    = '';
  f.evSubtitulo = '';
  f.evFechas    = '';
  f.evLugar     = '';
  f.evLinks     = [];
  if (f.tipo === 'evento') {
    var evTitleEl = mainEl.querySelector('.event-box-title');
    if (evTitleEl) {
      var em = evTitleEl.querySelector('em');
      if (em) { f.evSubtitulo = em.textContent.trim(); em.remove(); }

    }

    mainEl.querySelectorAll('.event-box-links a').forEach(function(a){

  f.contentBlocks = [];

      f.contentBlocks.push({type:'subtitulo', text: el.innerHTML});
    } else if (tag === 'h2' && cls.indexOf('article-lead-title') !== -1) {
      f.contentBlocks.push({type:'titulo', text: el.innerHTML});
    } else if (tag === 'p' && !cls.includes('back-link')) {
      f.contentBlocks.push({type:'parrafo', text: el.innerHTML});

  });

  f.links = [];
  mainEl.querySelectorAll('.article-links a').forEach(function(a){
    f.links.push({label:a.textContent.trim(),url:a.getAttribute('href')||''});
  });
  // Excerpt from newsEntry (loaded later)
  f.excerpt = '';
  f.searchDesc = '';
  S.newsFormData = f;

function makeBlock(el) {
  var id = blockId++, tag = el.tagName?el.tagName.toLowerCase():'', cls = el.className||'';
  if (tag==='h2'||tag==='h3') return {id:id,type:'heading',tag:tag,html:el.innerHTML,cls:cls};
  if (tag==='p') return {id:id,type:'paragraph',html:el.innerHTML,cls:cls};
  if (tag==='figure'||cls.indexOf('inline-figure')!==-1) {
    var img=el.querySelector('img'), cap=el.querySelector('figcaption');
    return {id:id,type:'figure',src:img?img.getAttribute('src'):'',alt:img?img.getAttribute('alt'):'',caption:cap?cap.innerHTML:'',cls:cls,isLeft:cls.indexOf('-left')!==-1};
  }
  if (cls.indexOf('pull-quote')!==-1) return {id:id,type:'pullquote',html:el.innerHTML};
  if (cls.indexOf('article-links')!==-1) {
    var links=[]; el.querySelectorAll('a').forEach(function(a){ links.push({label:a.textContent.trim(),url:a.getAttribute('href')||''}); });
    return {id:id,type:'links',links:links};
  }
  if (cls.indexOf('book-highlight')!==-1) {
    var bpEl=el.querySelector('p'), baEl=el.querySelector('a.btn-consultar,a[href]');
    return {id:id,type:'highlight',html:bpEl?bpEl.innerHTML:'',btnLabel:baEl?baEl.textContent.trim():'',btnUrl:baEl?baEl.getAttribute('href')||'':''};
  }
  if (tag==='ul') {
    var items=[];
    el.querySelectorAll('li').forEach(function(li){
      var liClone=li.cloneNode(true);
      var noteEl=liClone.querySelector('span.biblio-note');
      var noteHtml='';
      if(noteEl){noteHtml=noteEl.innerHTML;noteEl.parentNode.removeChild(noteEl);}
      items.push({main:liClone.innerHTML.trim(),note:noteHtml});
    });
    return {id:id,type:'list',cls:cls,items:items};
  }
  if (tag==='script') return {id:id,type:'_skip',html:el.outerHTML};
  return {id:id,type:'_preserve',html:el.outerHTML};
}

function findCongressesObjectBounds(src) {
  // Matches "const congresses = {" or "var congresses = {"
  var m = src.match(/(?:const|var|let)\s+congresses\s*=/);
  if (!m) return null;
  var start = m.index;
  var braceStart = src.indexOf('{', start + m[0].length);
  if (braceStart === -1) return null;
  var depth = 0, i = braceStart, len = src.length;
  for (; i < len; i++) {
    if (src[i] === '{') depth++;
    else if (src[i] === '}') { depth--; if (depth === 0) break; }
  }
  return { start: start, end: i + 1, objStr: src.substring(braceStart, i + 1) };
}

function extractCongressesData() {
  var src = S.footerPart || '';
  var bounds = findCongressesObjectBounds(src);
  if (!bounds) return {};
  try { return new Function('return ' + bounds.objStr)(); } catch(e) { return {}; }
}

function enrichCongressItems() {
  // Extract modal ID from onclick attribute
  S.items.forEach(function(it) {
    if (it._group) return;
    var m = (it.onclick || '').match(/openModal\(['"]([^'"]+)['"]\)/);
    it.modalId = m ? m[1] : '';
  });
  // Load modal detail data from the congresses JS object in S.footerPart
  var cData = extractCongressesData();
  S.items.forEach(function(it) {
    if (it._group) return;
    var d = it.modalId ? (cData[it.modalId] || {}) : {};
    it.modalTitle = d.title !== undefined ? d.title : '';
    it.modalDescription = d.description !== undefined ? d.description : '';
    it.modalLinks = (d.links || []).map(function(l) { return {label: l.label || '', url: l.url || ''}; });
  });
}

function parseMultimedia(main) {
  var intro = main.querySelector('.intro-text');
  S.introHtml = intro ? intro.innerHTML : '';

  // Parse local videos src from the footer script block (const videos = {...})
  // Match each entry individually: id: { ... src: "..." ... }
  var localVideosMap = {};
  var entryRe = /['"]?([\w-]+)['"]?\s*:\s*\{[^{}]*src\s*:\s*['"]([^'"]+)['"][^{}]*\}/g, em;
  while ((em = entryRe.exec(S.footerPart)) !== null) {
    localVideosMap[em[1]] = { src: em[2] };
  }

  main.querySelectorAll('.video-card').forEach(function(el) {
    var img = el.querySelector('img');
    var url = '', localSrc = '', videoId = '';
    var source = txt(el, '.video-source-badge');
    var oc = el.getAttribute('onclick') || '';
    var isLocal = false;
    var openM = oc.match(/openVideo\(['"]([^'"]+)['"]\)/);
    if (openM) {
      videoId = openM[1];
      isLocal = true;
      localSrc = (localVideosMap[videoId] || {}).src || '';
    } else {
      var winM = oc.match(/window\.open\(['"]([^'"]+)['"]/);
      if (winM) url = winM[1];
    }
    S.items.push({
      id: blockId++,
      image: img ? img.getAttribute('src') : '',
      imageAlt: img ? img.getAttribute('alt') : '',
      source: source,
      date: txt(el, '.video-date'),
      title: (el.querySelector('.video-title') || {}).innerHTML || '',
      desc: txt(el, '.video-desc'),
      url: url,
      localSrc: localSrc,
      videoId: videoId,
      isLocal: isLocal,
    });
  });
}

async function uploadImage(inputId, fileInput) {
  if (!fileInput.files || !fileInput.files.length) return;
  var file = fileInput.files[0];
  toast('Subiendo imagen…', 'info');
  try {
    var r = await fetch('/api/upload-image?name='+encodeURIComponent(file.name), {
      method: 'POST',
      headers: {'Content-Type': file.type || 'application/octet-stream'},
      body: file,
    });
    var data = await r.json();
    if (data.ok) {
      var input = document.getElementById(inputId);
      if (input) {
        var depth = S.currentPath.split('/').length - 1;
        var prefix = depth > 0 ? '../' : '';
        input.value = prefix + 'media/' + data.filename;
      }
      // Refresh media list
      var mr = await fetch('/api/media');
      S.media = await mr.json();
      toast('Imagen subida: ' + data.filename, 'ok');
    } else {
      toast('Error al subir: ' + (data.error || 'desconocido'), 'err');
    }
  } catch(e) {
    toast('Error de conexión al subir imagen', 'err');
  }
  fileInput.value = '';
}

// ── RICH TEXT COMMANDS ────────────────────────────────────────────────────────
function execRich(e,cmd) {
  e.preventDefault();
  if (cmd==='link') {
    var url = prompt('Escribe la URL del enlace:','https://');
    if (url) document.execCommand('createLink',false,url);
  } else if (cmd==='removeLink') {
    document.execCommand('unlink');
  } else if (cmd==='insertBr') {
    document.execCommand('insertHTML', false, '<br>');
  } else if (cmd==='wrapBiblioNote') {
    var sel = window.getSelection();
    if (sel && sel.rangeCount && !sel.isCollapsed) {
      var range = sel.getRangeAt(0);
      var span = document.createElement('span');
      span.className = 'biblio-note';
      try { range.surroundContents(span); } catch(ex) {
        // If selection crosses nodes, insert HTML
        var frag = range.extractContents();
        span.appendChild(frag);
        range.insertNode(span);
      }
    } else {
      document.execCommand('insertHTML', false, '<span class="biblio-note">Nota descriptiva. → <a href="https://" target="_blank" rel="noopener noreferrer">CONSULTAR AQUÍ</a></span>');
    }
  } else if (cmd==='insertConsultLink') {
    var url = prompt('URL del enlace de consulta:','https://');
    if (url) document.execCommand('insertHTML', false, '[<a href="'+url+'" target="_blank" rel="noopener noreferrer">CONSULTAR AQUÍ</a>]');
  } else {
    document.execCommand(cmd);
  }
}

function initRichEditors() {
  // Prevent formatting paste (strip HTML on paste)
  document.querySelectorAll('.rich-edit').forEach(function(el) {
    el.addEventListener('paste', function(e) {
      if (el.dataset.allowHtmlPaste) return;
      // Allow paste but keep basic formatting
    });
  });
}

// ── IMAGE PICKER ─────────────────────────────────────────────────────────────
function openImgPicker(inputId) {
  imgPickerCallback = inputId;
  var grid = document.getElementById('imgGrid');
  grid.innerHTML = S.media.map(function(f) {
    return '<img src="media/'+f+'" alt="'+esc(f)+'" title="'+esc(f)+'" onclick="pickImage(\''+esc(f)+'\')">';
  }).join('');
  document.getElementById('imgModal').classList.add('open');
  document.getElementById('imgSearch').value = '';
}

function pickImage(filename) {
  if (imgPickerCallback) {
    var input = document.getElementById(imgPickerCallback);
    // Determine relative path based on current page depth
    var depth = S.currentPath.split('/').length - 1;
    var prefix = depth > 0 ? '../' : '';
    input.value = prefix + 'media/' + filename;
  }
  closeImgModal();
}

function filterImages() {
  var q = document.getElementById('imgSearch').value.toLowerCase();
  document.querySelectorAll('#imgGrid img').forEach(function(img) {
    img.style.display = img.alt.toLowerCase().indexOf(q) !== -1 ? '' : 'none';
  });
}

function closeImgModal() {
  document.getElementById('imgModal').classList.remove('open');
  imgPickerCallback = null;
}

function renderBlocksEditor() {
  var h = '<div class="ed-section"><h2>Contenido principal</h2>';
  h += '<p class="help" style="margin-bottom:.6rem">Edita el contenido de la página. Puedes añadir, eliminar y reordenar los bloques.</p>';
  h += '<div id="blocksContainer">';
  S.blocks.forEach(function(b,i) {
    if (b.type==='_skip'||b.type==='_preserve') return;
    h += renderBlockCard(b,i);
  });
  h += '</div>';
  h += '<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.6rem">';
  h += '<button class="btn btn-blue btn-sm" onclick="addBlock(\'paragraph\')">+ Párrafo</button>';
  h += '<button class="btn btn-sm" style="background:var(--dorado);color:#fff" onclick="addBlock(\'heading\')">+ Título</button>';
  h += '<button class="btn btn-sm" style="background:#5a7d5a;color:#fff" onclick="addBlock(\'figure\')">+ Figura</button>';
  h += '<button class="btn btn-sm" style="background:#7a6f60;color:#fff" onclick="addBlock(\'pullquote\')">+ Cita destacada</button>';
  h += '<button class="btn btn-sm" style="background:#6a5a8a;color:#fff" onclick="addBlock(\'links\')">+ Enlaces</button>';
  h += '<button class="btn btn-sm" style="background:#8a6a4a;color:#fff" onclick="addBlock(\'highlight\')">+ Bloque destacado</button>';
  h += '<button class="btn btn-sm" style="background:#4a7a8a;color:#fff" onclick="addBlock(\'list\')">+ Lista bibliográfica</button>';
  h += '</div>';
  h += '</div>';
  return h;
}

function renderBlockCard(b) {
  var types = {heading:'Título',paragraph:'Párrafo',figure:'Figura',pullquote:'Cita',links:'Enlaces',highlight:'Destacado',list:'Lista'};
  var tcls = {heading:'type-h',paragraph:'type-p',figure:'type-fig',pullquote:'type-quote',links:'type-links',highlight:'type-quote',list:'type-p'};
  var h = '<div class="block-card" data-bid="'+b.id+'">';
  h += '<div class="block-header">';
  h += '<span class="block-handle">☰</span>';
  h += '<span class="block-type '+(tcls[b.type]||'type-p')+'">'+(types[b.type]||b.type)+'</span>';
  h += '<div class="block-actions">';
  h += '<button title="Subir" onclick="moveBlock('+b.id+',-1)">↑</button>';
  h += '<button title="Bajar" onclick="moveBlock('+b.id+',1)">↓</button>';
  h += '<button class="del" title="Eliminar" onclick="removeBlock('+b.id+')">✕</button>';
  h += '</div></div>';

  if (b.type==='heading') {
    h += '<div style="display:flex;gap:.5rem;align-items:flex-end">';
    h += '<div style="width:70px"><label>Nivel</label><select onchange="updBlock('+b.id+',\'tag\',this.value)">';
    h += '<option value="h2"'+(b.tag==='h2'?' selected':'')+'>H2</option>';
    h += '<option value="h3"'+(b.tag==='h3'?' selected':'')+'>H3</option></select></div>';
    h += '<div style="flex:1"><label>Texto</label><input type="text" value="'+escA(b.html.replace(/<[^>]+>/g,''))+'" onchange="updBlock('+b.id+',\'html\',this.value)"></div>';
    h += '</div>';
  } else if (b.type==='paragraph') {
    h += richField('Contenido',b.html,'block-'+b.id);
  } else if (b.type==='figure') {
    h += imgField('Imagen',b.src,'img-'+b.id);
    h += field('Texto alternativo','alt-'+b.id,b.alt,'Descripción breve de la imagen');
    h += field('Pie de foto','cap-'+b.id, (b.caption||'').replace(/<[^>]+>/g,''));
    h += '<div class="field"><label>Posición</label><select id="pos-'+b.id+'"><option value="right"'+(b.isLeft?'':' selected')+'>Derecha</option><option value="left"'+(b.isLeft?' selected':'')+'>Izquierda</option></select></div>';
  } else if (b.type==='pullquote') {
    h += richField('Texto de la cita',b.html,'block-'+b.id);
  } else if (b.type==='links') {
    h += '<div id="links-'+b.id+'">';
    (b.links||[]).forEach(function(l,li) {
      h += '<div class="link-row">';
      h += '<input type="text" value="'+escA(l.label)+'" placeholder="Texto del enlace">';
      h += '<input type="text" value="'+escA(l.url)+'" placeholder="URL">';
      h += '<button class="del-link" onclick="delLink('+b.id+','+li+')">×</button>';
      h += '</div>';
    });
    h += '</div>';
    h += '<button class="btn btn-outline btn-sm" style="margin-top:.3rem" onclick="addLink('+b.id+')">+ Añadir enlace</button>';
  } else if (b.type==='highlight') {
    h += richField('Texto del bloque destacado',b.html,'block-'+b.id);
    h += field('Texto del botón','btnlabel-'+b.id,b.btnLabel,'Ej.: ↓ Consultar aquí (PDF)');
    h += '<div class="field"><label>URL del botón</label><div style="display:flex;gap:.4rem;align-items:center">';
    h += '<input type="text" id="btnurl-'+b.id+'" value="'+escA(b.btnUrl||'')+'" placeholder="Ej.: ../media/archivo.pdf" style="flex:1">';
    h += '<label class="btn btn-outline btn-sm img-upload-btn" title="Subir archivo (PDF)"><input type="file" accept=".pdf,image/*" style="display:none" onchange="uploadHighlightFile(this,\''+b.id+'\')">Subir</label>';
    h += '</div></div>';
  } else if (b.type==='list') {
    h += '<div id="listEntries-'+b.id+'">';
    (b.items||[]).forEach(function(item,i){
      h += '<div class="list-entry" style="border:1px solid var(--borde);border-radius:4px;padding:.5rem;margin-bottom:.5rem">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">';
      h += '<span style="font-size:.72rem;font-weight:600;color:var(--azul)">Entrada '+(i+1)+'</span>';
      h += '<button class="del" title="Eliminar entrada" onclick="delListEntry('+b.id+','+i+')">✕</button>';
      h += '</div>';
      h += richFieldBiblio('Citación (autor, título, publicación, año, páginas, enlace…)',item.main,'listmain-'+b.id+'-'+i);
      h += richFieldBiblio('Nota descriptiva (descripción adicional con enlace; opcional)',item.note||'','listnote-'+b.id+'-'+i);
      h += '</div>';
    });
    h += '</div>';
    h += '<button class="btn btn-outline btn-sm" style="margin-top:.4rem" onclick="addListEntry('+b.id+')">+ Añadir entrada</button>';
  }
  h += '</div>';
  return h;
}

function addBlock(type) {
  var b = {id:blockId++,type:type};
  if (type==='heading') { b.tag='h2'; b.html=''; b.cls=''; }
  else if (type==='paragraph') { b.html='<p>Nuevo párrafo</p>'; b.cls=''; }
  else if (type==='figure') { b.src=''; b.alt=''; b.caption=''; b.isLeft=false; b.cls=''; }
  else if (type==='pullquote') { b.html='Cita destacada'; }
  else if (type==='links') { b.links=[{label:'',url:''}]; }
  else if (type==='highlight') { b.html=''; b.btnLabel='↓ Consultar aquí (PDF)'; b.btnUrl=''; }
  else if (type==='list') { b.cls='biblio-list'; b.items=[{main:'Nueva entrada bibliográfica.',note:''}]; }
  S.blocks.push(b);
  rerenderBlocks();
}

function removeBlock(bid) {
  if (!confirm('¿Eliminar este bloque?')) return;
  S.blocks = S.blocks.filter(function(b){return b.id!==bid;});
  rerenderBlocks();
}

function moveBlock(bid,dir) {
  readAllBlocks();
  var i = S.blocks.findIndex(function(b){return b.id===bid;});
  if (i===-1) return;
  var ni = i+dir;
  if (ni<0||ni>=S.blocks.length) return;
  var tmp=S.blocks[i]; S.blocks[i]=S.blocks[ni]; S.blocks[ni]=tmp;
  rerenderBlocks();
}

function updBlock(bid,key,val) {
  var b = S.blocks.find(function(b){return b.id===bid;});
  if (b) b[key]=val;
}

function addLink(bid) {
  readAllBlocks();
  var b = S.blocks.find(function(b){return b.id===bid;});
  if (b) { if(!b.links) b.links=[]; b.links.push({label:'',url:''}); }
  rerenderBlocks();
}

function delLink(bid,li) {
  readAllBlocks();
  var b = S.blocks.find(function(b){return b.id===bid;});
  if (b&&b.links) { b.links.splice(li,1); }
  rerenderBlocks();
}

function addListEntry(bid) {
  readAllBlocks();
  var b = S.blocks.find(function(b){return b.id===bid;});
  if (b) { if(!b.items) b.items=[]; b.items.push({main:'Nueva entrada bibliográfica.',note:''}); }
  rerenderBlocks();
}

function delListEntry(bid,idx) {
  readAllBlocks();
  var b = S.blocks.find(function(b){return b.id===bid;});
  if (b&&b.items) { b.items.splice(idx,1); }
  rerenderBlocks();
}

async function uploadHighlightFile(fileInput, bid) {
  if (!fileInput.files || !fileInput.files.length) return;
  var file = fileInput.files[0];
  toast('Subiendo archivo…', 'info');
  try {
    var r = await fetch('/api/upload-image?name='+encodeURIComponent(file.name), {
      method: 'POST',
      headers: {'Content-Type': file.type || 'application/octet-stream'},
      body: file,
    });
    var data = await r.json();
    if (data.ok) {
      var depth = S.currentPath.split('/').length - 1;
      var prefix = depth > 0 ? '../' : '';
      var urlInput = document.getElementById('btnurl-'+bid);
      if (urlInput) urlInput.value = prefix + 'media/' + data.filename;
      toast('Archivo subido: ' + data.filename, 'ok');
    } else {
      toast('Error al subir: ' + (data.error || 'desconocido'), 'err');
    }
  } catch(e) {
    toast('Error de conexión al subir archivo', 'err');
  }
  fileInput.value = '';
}

function rerenderBlocks() {
  var c = document.getElementById('blocksContainer');
  if (!c) return;
  var h = '';
  S.blocks.forEach(function(b) {
    if (b.type==='_skip'||b.type==='_preserve') return;
    h += renderBlockCard(b);
  });
  c.innerHTML = h;
  initRichEditors();
}

function readAllBlocks() {
  S.blocks.forEach(function(b) {
    if (b.type==='paragraph'||b.type==='pullquote') {
      var el = document.querySelector('[data-rich-id="block-'+b.id+'"]');
      if (el) b.html = el.innerHTML;
    }
    if (b.type==='figure') {
      var si=document.getElementById('img-'+b.id); if(si) b.src=si.value;
      var ai=document.getElementById('alt-'+b.id); if(ai) b.alt=ai.value;
      var ci=document.getElementById('cap-'+b.id); if(ci) b.caption=ci.value;
      var pi=document.getElementById('pos-'+b.id); if(pi) b.isLeft=pi.value==='left';
    }
    if (b.type==='heading') {
      // Already updated via onchange
    }
    if (b.type==='links') {
      var container = document.getElementById('links-'+b.id);
      if (container) {
        b.links = [];
        container.querySelectorAll('.link-row').forEach(function(row) {
          var inputs = row.querySelectorAll('input');
          if (inputs.length >= 2) b.links.push({label:inputs[0].value,url:inputs[1].value});
        });
      }
    }
    if (b.type==='highlight') {
      var el = document.querySelector('[data-rich-id="block-'+b.id+'"]');
      if (el) b.html = el.innerHTML;
      var lbl=document.getElementById('btnlabel-'+b.id); if(lbl) b.btnLabel=lbl.value;
      var url=document.getElementById('btnurl-'+b.id); if(url) b.btnUrl=url.value;
    }
    if (b.type==='list') {
      (b.items||[]).forEach(function(item,i){
        var mainEl=document.querySelector('[data-rich-id="listmain-'+b.id+'-'+i+'"]');
        var noteEl=document.querySelector('[data-rich-id="listnote-'+b.id+'-'+i+'"]');
        if(mainEl) item.main=mainEl.innerHTML;
        if(noteEl) item.note=noteEl.innerHTML;
      });
    }
  });
}

async function uploadCongressLinkFile(fileInput) {
  if (!fileInput.files || !fileInput.files.length) return;
  var file = fileInput.files[0];
  var ext = file.name.split('.').pop().toLowerCase();
  var endpoint = ext === 'pdf' ? '/api/upload-image' : '/api/upload-image';
  toast('Subiendo archivo…', 'info');
  try {
    var r = await fetch(endpoint + '?name=' + encodeURIComponent(file.name), {
      method: 'POST',
      headers: {'Content-Type': file.type || 'application/octet-stream'},
      body: file,
    });
    var data = await r.json();
    if (data.ok) {
      var depth = S.currentPath.split('/').length - 1;
      var prefix = depth > 0 ? '../' : '';
      var urlInput = fileInput.closest('.link-row').querySelectorAll('input[type="text"]')[1];
      if (urlInput) urlInput.value = prefix + 'media/' + data.filename;

function updateVideoCardUI(iid) {
  var cb = document.getElementById('vilocal-'+iid);
  var urlRow = document.getElementById('viu-row-'+iid);
  var localRow = document.getElementById('vil-row-'+iid);
  if (!cb || !urlRow || !localRow) return;
  urlRow.style.display = cb.checked ? 'none' : '';
  localRow.style.display = cb.checked ? '' : 'none';
}

function getKnownVideoSources() {
  var base = ['RTVE','YouTube','BTV'];
  S.items.forEach(function(it) {
    if (it.source && base.indexOf(it.source) === -1) base.push(it.source);
  });
  return base;
}

function updateVideoSource(iid) {
  var sel = document.getElementById('vis-sel-'+iid);
  var txt = document.getElementById('vis-txt-'+iid);
  if (!sel || !txt) return;
  if (sel.value === '_custom') { txt.style.display = ''; txt.focus(); }
  else txt.style.display = 'none';
}

async function uploadLocalVideo(iid, input) {
  if (!input.files || !input.files.length) return;
  var file = input.files[0];
  var pathEl = document.getElementById('vilp-'+iid);
  toast('Subiendo vídeo…', 'info');
  try {
    var r = await fetch('/api/upload-media?name='+encodeURIComponent(file.name), {
      method: 'POST',
      headers: {'Content-Type': file.type || 'application/octet-stream'},
      body: file,
    });
    var data = await r.json();
    if (data.ok) {
      if (pathEl) pathEl.value = '../media/' + data.filename;
      toast('Vídeo subido: ' + data.filename, 'ok');
    } else {
      toast('Error al subir: ' + (data.error || 'desconocido'), 'err');
    }
  } catch(e) {
    toast('Error de conexión al subir vídeo', 'err');
  }
}

function removeItem(iid) {
  var item = S.items.find(function(it){return it.id===iid;});
  if (item && item._group) return;
  if (!confirm('¿Eliminar este elemento?')) return;
  readAllItems();
  S.items = S.items.filter(function(it){return it.id!==iid;});
  rerenderItems();
}

function rerenderItems() {
  if (S.pageType === 'members') {
    var c = document.getElementById('itemsContainer');
    var p = document.getElementById('pastItemsContainer');
    if (c) { var h=''; S.items.filter(function(it){return !it.past;}).forEach(function(it){h+=renderMemberCard(it);}); c.innerHTML=h; }
    if (p) { var h=''; S.items.filter(function(it){return it.past;}).forEach(function(it){h+=renderMemberCard(it);}); p.innerHTML=h; }
    initRichEditors();
    initMembersDrag();
    return;
  }
  var c = document.getElementById('itemsContainer');
  if (!c) return;
  var h = '';
  S.items.forEach(function(it) {
    if (S.pageType==='theses') h += renderThesisCard(it);
    else if (S.pageType==='congresses') h += renderCongressCard(it);
    else if (S.pageType==='seminars') h += renderSeminarCard(it);
    else if (S.pageType==='multimedia') h += renderVideoCard(it);
    else if (S.pageType==='projects') h += it._group ? renderProjectEraHeader(it) : renderProjectCard(it);
  });
  c.innerHTML = h;
  initRichEditors();
  if (S.pageType==='theses' || S.pageType==='congresses' || S.pageType==='seminars' || S.pageType==='projects') initThesisDrag();
}

function initMembersDrag() {
  ['itemsContainer','pastItemsContainer'].forEach(function(cid) {
    var c = document.getElementById(cid);
    if (!c) return;
    c.querySelectorAll('.item-card[draggable]').forEach(function(card) {
      card.addEventListener('dragstart', function(e) {
        _dragSrcId = parseInt(card.getAttribute('data-iid'));
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragover', function(e) {
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', function() { card.classList.remove('drag-over'); });
      card.addEventListener('drop', function(e) {
        e.preventDefault(); card.classList.remove('drag-over');
        var targetId = parseInt(card.getAttribute('data-iid'));
        if (_dragSrcId === null || _dragSrcId === targetId) return;
        readAllItems();
        var srcIdx = S.items.findIndex(function(it){return it.id===_dragSrcId;});
        var tgtIdx = S.items.findIndex(function(it){return it.id===targetId;});
        if (srcIdx<0||tgtIdx<0) return;
        var removed = S.items.splice(srcIdx,1)[0];
        S.items.splice(tgtIdx,0,removed);
        rerenderItems();
      });
      card.addEventListener('dragend', function() { card.classList.remove('drag-over'); });
    });
  });
}

var _dragSrcId = null;
function initThesisDrag() {
  var c = document.getElementById('itemsContainer');
  if (!c) return;
  c.querySelectorAll('.item-card[draggable]').forEach(function(card) {
    card.addEventListener('dragstart', function(e) {

    });
    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', function() {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      card.classList.remove('drag-over');
      var targetId = parseInt(card.getAttribute('data-iid'));
      if (_dragSrcId === null || _dragSrcId === targetId) return;
      readAllItems();
      var srcIdx = S.items.findIndex(function(it){return it.id===_dragSrcId;});
      var tgtIdx = S.items.findIndex(function(it){return it.id===targetId;});
      if (srcIdx<0||tgtIdx<0) return;

      S.items.splice(tgtIdx,0,removed);

    });
    card.addEventListener('dragend', function() {

  });
}

  var label = 'Parte '+(p.roman||String(p.num||idx+1))+(p.year?' ('+p.year+')':'')+(p.coord?' — '+p.coord:'');
  var h = '<details class="item-card" data-parte-det="'+idx+'" style="margin-bottom:.5rem"'+openAttr+'>';
  h += '<summary style="cursor:pointer;display:flex;align-items:center;gap:.5rem;list-style:none;padding-right:2rem">'
    +'<strong>'+esc(label)+'</strong>'
    +'<button class="btn-del-item" onclick="event.preventDefault();removeParte('+idx+')" style="position:static;margin-left:auto">✕</button>'
    +'</summary>';
  h += '<div style="padding-top:.75rem">';
  h += '<div class="row">';
  h += '<div>'+field('Número','pnum-'+idx,String(p.num||idx+1))+'</div>';
  h += '<div>'+field('Romano (ej.: XV)','proman-'+idx,p.roman||'')+'</div>';
  h += '<div>'+field('Año','pyear-'+idx,String(p.year||''))+'</div>';
  h += '</div>';
  h += field('Coordinador/es (vacío si no hay)','pcoord-'+idx,p.coord||'','Ej.: Luigi Giuliani y Ramón Valdés');
  h += field('Editorial','pedit-'+idx,p.editorial||'');
  h += field('Ciudad','pcity-'+idx,p.city||'');
  h += imgField('Portada',p.image||'','pimg-'+idx);
  h += '<div style="margin-top:.75rem;border-top:1px solid var(--border);padding-top:.5rem">';
  h += '<strong style="font-size:.85rem">Tomos / Volúmenes</strong>';
  h += '<div id="pvols-'+idx+'">';
  (p.volumes||[]).forEach(function(v, vi) { h += renderVolCard(idx, vi, v); });
  h += '</div>';
  h += '<button class="btn btn-outline btn-sm" style="margin-top:.4rem" onclick="addVol('+idx+')">+ Añadir tomo</button>';
  h += '</div>';
  h += '</div>';
  h += '</details>';
  return h;
}

function renderVolCard(idx, vi, v) {
  var h = '<div class="item-card" data-vol-idx="'+vi+'" style="margin:.5rem 0;padding:.6rem .8rem;border-left:3px solid var(--dorado)">';
  h += '<button class="btn-del-item" onclick="removeVol('+idx+','+vi+')">✕</button>';
  h += '<div class="item-card-header"><strong style="font-size:.85rem">'+esc(v.label||'Tomo '+(vi+1))+'</strong></div>';
  h += '<div class="row">';
  h += '<div>'+field('Etiqueta (ej.: Tomo I)','pvlabel-'+idx+'-'+vi,v.label||'')+'</div>';
  h += '<div>'+field('ISBN','pvisbn-'+idx+'-'+vi,v.isbn||'')+'</div>';
  h += '</div>';
  h += '<div style="margin-top:.4rem"><strong style="font-size:.78rem;color:#888">Obras</strong>';
  h += '<div id="pplays-'+idx+'-'+vi+'">';
  (v.plays||[]).forEach(function(play, pi) { h += renderPlayRow(idx, vi, pi, play); });
  h += '</div>';
  h += '<button class="btn btn-outline btn-sm" style="margin-top:.3rem;font-size:.75rem" onclick="addPlay('+idx+','+vi+')">+ Añadir obra</button>';
  h += '</div>';
  h += '</div>';
  return h;
}

function renderPlayRow(idx, vi, pi, play) {
  var h = '<div class="item-card" data-play-idx="'+pi+'" style="margin:.3rem 0;padding:.4rem .6rem;border:1px solid var(--border)">';
  h += '<button class="btn-del-item" onclick="removePlay('+idx+','+vi+','+pi+')" style="top:.3rem;right:.3rem">✕</button>';
  h += '<div class="row">';
  h += '<div style="flex:2">'+field('Título','pptitle-'+idx+'-'+vi+'-'+pi,play.title||'')+'</div>';
  h += '<div style="flex:1">'+field('Páginas','pppages-'+idx+'-'+vi+'-'+pi,play.pages||'')+'</div>';
  h += '</div>';
  h += field('Editores','ppeditors-'+idx+'-'+vi+'-'+pi,play.editors||'','Ej.: ed. Luigi Giuliani');
  h += '<div class="field"><label><input type="checkbox" id="pphistory-'+idx+'-'+vi+'-'+pi+'"'+(play.history?' checked':'')+' style="margin-right:.3rem"> Historia editorial (no es una obra de teatro)</label></div>';
  h += '</div>';
  return h;
}

function addParte() {
  readPartesFormValues();
  var num = (S.partesData||[]).length + 1;
  if (!S.partesData) S.partesData = [];
  S.partesData.push({num:num, roman:'', year:'', coord:null, editorial:'', city:'', image:'', volumes:[], _open:true});
  rerenderPartes();
}

function removeParte(idx) {
  if (!confirm('¿Eliminar la Parte '+(idx+1)+'?')) return;
  readPartesFormValues();
  S.partesData.splice(idx, 1);
  rerenderPartes();
}

function addVol(idx) {
  readPartesFormValues();
  if (!S.partesData || !S.partesData[idx]) return;
  if (!S.partesData[idx].volumes) S.partesData[idx].volumes = [];
  var vi = S.partesData[idx].volumes.length + 1;
  S.partesData[idx].volumes.push({label:'Tomo '+toRoman(vi), isbn:'', plays:[]});
  rerenderPartes();
}

function removeVol(idx, vi) {
  if (!confirm('¿Eliminar este tomo?')) return;
  readPartesFormValues();
  if (!S.partesData || !S.partesData[idx]) return;
  S.partesData[idx].volumes.splice(vi, 1);
  rerenderPartes();
}

function addPlay(idx, vi) {
  readPartesFormValues();
  if (!S.partesData || !S.partesData[idx] || !S.partesData[idx].volumes[vi]) return;
  S.partesData[idx].volumes[vi].plays.push({title:'', editors:'', pages:''});
  rerenderPartes();
}

function removePlay(idx, vi, pi) {
  readPartesFormValues();
  if (!S.partesData || !S.partesData[idx] || !S.partesData[idx].volumes[vi]) return;
  S.partesData[idx].volumes[vi].plays.splice(pi, 1);
  rerenderPartes();
}

function toRoman(n) {
  var v=[['M',1000],['CM',900],['D',500],['CD',400],['C',100],['XC',90],['L',50],['XL',40],['X',10],['IX',9],['V',5],['IV',4],['I',1]];
  var r=''; v.forEach(function(p){while(n>=p[1]){r+=p[0];n-=p[1];}});return r;
}

function rerenderPartes() {
  var c = document.getElementById('partesContainer');
  if (c) c.innerHTML = renderAllPartes();
}

function readPartesFormValues() {
  if (S.pageType !== 'partes' || !S.partesData) return;
  S.partesData.forEach(function(p, idx) {
    var el;
    var det = document.querySelector('[data-parte-det="'+idx+'"]');
    if (det) p._open = det.open;
    el = document.getElementById('pnum-'+idx); if(el) p.num = parseInt(el.value)||idx+1;
    el = document.getElementById('proman-'+idx); if(el) p.roman = el.value;
    el = document.getElementById('pyear-'+idx); if(el) p.year = parseInt(el.value)||el.value||'';
    el = document.getElementById('pcoord-'+idx); if(el) p.coord = el.value.trim()||null;
    el = document.getElementById('pedit-'+idx); if(el) p.editorial = el.value;
    el = document.getElementById('pcity-'+idx); if(el) p.city = el.value;
    el = document.getElementById('pimg-'+idx); if(el) p.image = el.value;
    (p.volumes||[]).forEach(function(v, vi) {
      el = document.getElementById('pvlabel-'+idx+'-'+vi); if(el) v.label = el.value;
      el = document.getElementById('pvisbn-'+idx+'-'+vi); if(el) v.isbn = el.value;
      (v.plays||[]).forEach(function(play, pi) {
        el = document.getElementById('pptitle-'+idx+'-'+vi+'-'+pi); if(el) play.title = el.value;
        el = document.getElementById('ppeditors-'+idx+'-'+vi+'-'+pi); if(el) play.editors = el.value;
        el = document.getElementById('pppages-'+idx+'-'+vi+'-'+pi); if(el) play.pages = el.value;
        var hEl = document.getElementById('pphistory-'+idx+'-'+vi+'-'+pi);
        if (hEl && hEl.checked) { play.history = true; } else { delete play.history; }
      });
    });
  });
}

function genPartes() {
  var h = '\n';
  h += '    <p class="intro-text">\n      '+S.introHtml+'\n    </p>\n';
  if (S.partesSearchHtml) h += '\n    <!-- SEARCH -->\n    '+S.partesSearchHtml+'\n';
  h += '\n    <!-- GRID (JS-generated) -->\n    <div class="partes-grid" id="partesGrid"></div>\n';
  if (S.partesNoResultsHtml) h += '    '+S.partesNoResultsHtml+'\n';
  return h;
}

function updatePartesScript() {
  if (!S.partesData) return;
  var clean = S.partesData.map(function(p) { var c=Object.assign({},p); delete c._open; return c; });
  var partesJson = JSON.stringify(clean, null, 2);
  // Find and replace the full PARTES array using bracket counting
  var startTag = S.footerPart.indexOf('const PARTES =');
  if (startTag === -1) startTag = S.footerPart.search(/const\s+PARTES\s*=/);
  if (startTag === -1) return;
  var arrStart = S.footerPart.indexOf('[', startTag);
  if (arrStart === -1) return;
  var depth = 0, i = arrStart, arrEnd = -1;
  while (i < S.footerPart.length) {
    var ch = S.footerPart[i];
    if (ch === '[') depth++;
    else if (ch === ']') { depth--; if (depth === 0) { arrEnd = i; break; } }
    i++;
  }
  if (arrEnd === -1) return;
  // Include the trailing semicolon if present
  var after = arrEnd + 1;
  while (after < S.footerPart.length && S.footerPart[after] === ' ') after++;
  var hasSemi = S.footerPart[after] === ';';
  S.footerPart = S.footerPart.slice(0, arrStart) + partesJson + (hasSemi ? ';' : '') + S.footerPart.slice(hasSemi ? after + 1 : after);
}

      var e=document.getElementById('cge-'+it.id); if(e) it.edition=e.value;
      var n=document.getElementById('cgn-'+it.id); if(n) it.name=n.value;
      var d=document.getElementById('cgd-'+it.id); if(d) it.dates=d.value;

      var i=document.getElementById('cgi-'+it.id); if(i) it.image=i.value;

    if (type==='multimedia') {

function generateHtml() {
  readFormValues();

  var content = '\n';

  // Hero
  content += genHero();

  // Wrapper open
  if (S.wrapperOpen) content += '\n  '+S.wrapperOpen+'\n';

  // Main open
  if (S.mainTag) content += '\n    <'+S.mainTag+S.mainAttrs+'>\n';

  // Specialized content
  if (S.pageType==='theses') content += genTheses();
  else if (S.pageType==='congresses') { content += genCongresses(); rebuildCongressesModalScript(); }
  else if (S.pageType==='seminars') content += genSeminars();
  else if (S.pageType==='multimedia') content += genMultimedia();
  else if (S.pageType==='members') content += genMembers();
  else if (S.pageType==='projects') content += genProjects();
  else if (S.pageType==='partes') content += genPartes();
  else content += genBlocks();

  // Main close
  if (S.mainTag) content += '\n    </'+S.mainTag+'>\n';

  // Sidebar
  if (S.hasSidebar) {
    var st = S.sidebarTag||'aside';
    var sa = S.sidebarAttrs||' class="article-sidebar"';
    content += '\n    <'+st+sa+'>\n'+S.sidebarHtml+'\n    </'+st+'>\n';
  }

  // Wrapper close
  if (S.wrapperClose) content += '\n  '+S.wrapperClose+'\n';

  // Content after main container (modal overlays, etc.) — preserved verbatim
  if (S.afterGridHtml) content += '\n'+S.afterGridHtml+'\n';

  content += '\n';

  // Update title in header
  var header = S.headerPart.replace(/<title>[\s\S]*?<\/title>/i, '<title>'+S.pageTitle+'</title>');
  // Update PARTES script in footer for partes page type
  if (S.pageType === 'partes') updatePartesScript();
  var footer = S.footerPart;
  if (_pendingLocalVideos) footer = updateFooterVideosScript(footer, _pendingLocalVideos);

  return header + content + footer;
}

    var b=document.getElementById('edBreadcrumb'); if(b) S.heroData.breadcrumbLast=b.value;
    var c=document.getElementById('edHeroCat'); if(c) S.heroData.catBadge=c.value;
    var d=document.getElementById('edHeroDate'); if(d) S.heroData.date=d.value;
    var s=document.getElementById('edHeroSub'); if(s) S.heroData.subtitle=s.value;
  }
  var sb=document.getElementById('edSidebar'); if(sb) S.sidebarHtml=sb.innerHTML;

    if (!S.newsEntry) S.newsEntry = {};
    var ne=document.getElementById('edNewsExcerpt'); if(ne) S.newsEntry.excerpt=ne.value;
    var ni=document.getElementById('edNewsImg'); if(ni) S.newsEntry.img=ni.value;

function genHero() {
  if (!S.heroData || !S.heroOriginalHtml) return '';
  var doc = new DOMParser().parseFromString('<div>'+S.heroOriginalHtml+'</div>','text/html');
  var hero = doc.querySelector('.page-hero, .article-hero, .idx-hero');
  if (!hero) return '\n  '+S.heroOriginalHtml+'\n';
  var h1=hero.querySelector('h1'); if(h1) h1.innerHTML=S.heroData.title;
  var bc=hero.querySelector('.breadcrumb, .article-breadcrumb, .page-hero-breadcrumb');
  if (bc && S.heroData.breadcrumbLast) {
    var nodes=bc.childNodes;
    for(var i=nodes.length-1;i>=0;i--) {
      if(nodes[i].nodeType===3 && nodes[i].textContent.trim()) { nodes[i].textContent='\n        '+S.heroData.breadcrumbLast+'\n      '; break; }
    }
  }
  if (S.heroData.type==='article') {
    var cb=hero.querySelector('.article-cat-badge'); if(cb) cb.textContent=S.heroData.catBadge;
    var ds=hero.querySelector('.article-date'); if(ds) ds.textContent=S.heroData.date;
  }
  if (S.heroData.type==='index') {
    var sub=hero.querySelector('.idx-hero-sub'); if(sub) sub.textContent=S.heroData.subtitle;
  }
  var html = hero.outerHTML.replace(/<(img|br|hr|meta|link|input|source)(\s[^>]*?)(?<!\/)>/gi,'<$1$2 />');
  return '\n  '+html+'\n';
}

// ── BLOCK HTML GENERATION ────────────────────────────────────────────────────
function genBlocks() {
  var h = '';
  S.blocks.forEach(function(b) {
    if (b.type==='_skip'||b.type==='_preserve') { h += '\n'+b.html+'\n'; return; }
    if (b.type==='heading') {
      var cls=b.cls?' class="'+escA(b.cls)+'"':'';
      h += '\n      <'+b.tag+cls+'>'+b.html+'</'+b.tag+'>\n';
    } else if (b.type==='paragraph') {
      var cls=b.cls?' class="'+escA(b.cls)+'"':'';
      h += '\n      <p'+cls+'>\n        '+b.html+'\n      </p>\n';
    } else if (b.type==='figure') {
      var fc=b.isLeft?'inline-figure-left':'inline-figure';
      if(b.cls&&b.cls!=='inline-figure'&&b.cls!=='inline-figure-left') fc=b.cls;
      h += '\n      <figure class="'+fc+'">\n';
      h += '        <div class="article-figure-img-wrap" onclick="openLightbox(this.querySelector(\'img\').src)">\n';
      h += '          <img src="'+escA(b.src)+'" alt="'+escA(b.alt)+'" />\n';
      h += '          <span class="zoom-hint" aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></span>\n';
      h += '        </div>\n';
      if(b.caption) h += '        <figcaption>'+b.caption+'</figcaption>\n';
      h += '      </figure>\n';
    } else if (b.type==='pullquote') {
      h += '\n      <div class="pull-quote">\n        '+b.html+'\n      </div>\n';
    } else if (b.type==='links') {
      if(!b.links||!b.links.length) return;
      h += '\n      <div class="article-links">\n';
      b.links.forEach(function(l) {
        if(!l.label||!l.url) return;
        h += '        <a class="article-ext-link" href="'+escA(l.url)+'" target="_blank" rel="noopener noreferrer">\n';
        h += '          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>\n';
        h += '          '+esc(l.label)+'\n        </a>\n';
      });
      h += '      </div>\n';
    } else if (b.type==='highlight') {
      h += '\n      <div class="book-highlight">\n';
      h += '        <p>\n          '+b.html+'\n        </p>\n';
      if (b.btnUrl) {

function rebuildCongressesModalScript() {

    lines += '      ' + it.modalId + ': {\n';

    lines += '        title: ' + JSON.stringify(it.modalTitle || '') + ',\n';
    lines += '        dates: ' + JSON.stringify(it.dates || '') + ',\n';

    lines += '        img: ' + JSON.stringify(it.image || '') + ',\n';
    lines += '        description: ' + JSON.stringify(it.modalDescription || '') + ',\n';
    lines += '        links: [\n';
    (it.modalLinks || []).forEach(function(l) {
      lines += '          { label: ' + JSON.stringify(l.label) + ', url: ' + JSON.stringify(l.url) + ' },\n';
    });
    lines += '        ]\n';
    lines += '      },\n';
  });
  lines += '    }';
  if (bounds) {
    // Replace existing congresses object
    S.footerPart = src.substring(0, bounds.start) +
      'const congresses = ' + lines + src.substring(bounds.end);

    // No existing object: inject before the first <script> closing tag in footer
    S.footerPart = src.replace('<' + '/script>', 'const congresses = ' + lines + ';\n  <' + '/script>');
  }
}

function updateFooterVideosScript(footerPart, localVideos) {
  var ids = Object.keys(localVideos);
  var lines = ['    const videos = {'];
  ids.forEach(function(id, i) {
    var v = localVideos[id];
    lines.push('      '+JSON.stringify(id)+': {');
    lines.push('        date: '+JSON.stringify(v.date)+',');
    lines.push('        title: '+JSON.stringify(v.title)+',');
    lines.push('        desc: '+JSON.stringify(v.desc)+',');
    lines.push('        type: \'inline\',');
    lines.push('        src: '+JSON.stringify(v.src));
    lines.push('      }'+(i < ids.length-1 ? ',' : ''));
  });
  lines.push('    };');
  var newDecl = lines.join('\n');
  // Replace existing const videos = {...}; block
  // Use [ \t]* (no newlines) so the backreference matches the indented closing };
  var replaced = footerPart.replace(/[ \t]*const\s+videos\s*=\s*\{[\s\S]*?\n[ \t]*\};/, newDecl);
  if (replaced !== footerPart) return replaced;
  // Fallback: insert before the openVideo function
  replaced = footerPart.replace(/([ \t]*)function\s+openVideo\s*\(/, function(m, indent) {
    return newDecl+'\n\n'+indent+'function openVideo(';
  });
  if (replaced !== footerPart) return replaced;
  // Last resort: prepend a new script block
  return '\n  <script>\n'+newDecl+'\n  <\/script>\n'+footerPart;
}

async function savePage() {
  if (S.pageType === 'news') { await saveNewsPage(); return; }
  var html = generateHtml();
  var btn = document.getElementById('btnSave');
  btn.textContent = 'Guardando…';
  btn.disabled = true;

  try {

      method: 'POST',
      headers: {'Content-Type': 'text/html; charset=utf-8'},
      body: html,

      if (S.pageType==='congresses') await updateCongressesSearchData();

      if (S.pageType==='multimedia') await updateMultimediaSearchData();
      if (S.pageType==='members') await updateMembersSearchData();
      if (S.pageType==='projects') await updateProjectsSearchData();
      if (S.pageType==='news' || S.pageType==='article') await updateGenericSearchData();

  } catch(e) {

  }

}

var _recursosSort = {col: 'name', dir: 1};
var _recursosFiles = [];

async function loadRecursos() {
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.toggle('active', el.dataset.path === '__recursos__'); });
  document.getElementById('topbar').style.display = 'none';
  var _wsX = document.getElementById('welcomeScreen'); if (_wsX) _wsX.style.display = 'none';
  document.getElementById('edBody').innerHTML = '<p style="padding:2rem;opacity:.5">Cargando recursos…</p>';
  try {
    var r = await fetch('/api/media-all');
    _recursosFiles = await r.json();
    renderRecursos();
  } catch(e) {
    document.getElementById('edBody').innerHTML = '<p style="padding:2rem;color:red">Error al cargar recursos: '+esc(e.message)+'</p>';
  }
}

function renderRecursos() {
  var files = _recursosFiles;
  var sort = _recursosSort;
  var sorted = files.slice().sort(function(a,b){
    var av = a[sort.col]||'', bv = b[sort.col]||'';
    return av < bv ? -sort.dir : av > bv ? sort.dir : 0;
  });

  var th = function(col, label) {
    var active = sort.col === col;
    var arrow = active ? (sort.dir === 1 ? ' ▲' : ' ▼') : '';
    return '<th style="cursor:pointer;user-select:none;white-space:nowrap" onclick="recursosSetSort(\''+col+'\')">'+label+arrow+'</th>';
  };

  var typeIcon = {imagen:'🖼', 'vídeo':'🎬', pdf:'📄', otro:'📁'};

  var rows = sorted.map(function(f) {
    var icon = typeIcon[f.type] || '📁';
    var isImg = f.type === 'imagen';
    var preview = isImg
      ? '<img src="media/'+escA(f.name)+'" style="width:48px;height:36px;object-fit:cover;border-radius:3px;vertical-align:middle">'
      : '<span style="font-size:1.4rem;vertical-align:middle">'+icon+'</span>';
    var size = f.size < 1024 ? f.size+'B' : f.size < 1048576 ? Math.round(f.size/1024)+'KB' : (f.size/1048576).toFixed(1)+'MB';
    var date = f.date ? new Date(f.date).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
    return '<tr>'
      +'<td style="width:60px;text-align:center">'+preview+'</td>'
      +'<td><span title="'+escA(f.name)+'">'+esc(f.name)+'</span></td>'
      +'<td style="white-space:nowrap">'+icon+' '+esc(f.type)+'</td>'
      +'<td style="white-space:nowrap">'+esc(size)+'</td>'
      +'<td style="white-space:nowrap">'+esc(date)+'</td>'
      +'</tr>';
  }).join('');

  var h = '<div class="ed-section" style="padding:1.5rem">';

function recursosSetSort(col) {
  if (_recursosSort.col === col) {

  }
  renderRecursos();

async function uploadRecursos(fileInput) {
  var files = Array.from(fileInput.files);
  if (!files.length) return;
  var ok = 0, err = 0;
  toast('Subiendo '+files.length+' archivo'+(files.length!==1?'s':'')+'…', 'info');
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var ext = file.name.split('.').pop().toLowerCase();
    var isImg = /^(jpg|jpeg|png|gif|svg|webp)$/.test(ext);
    var isVid = /^(mp4|webm|ogv|mov)$/.test(ext);
    var isPdf = ext === 'pdf';
    if (!isImg && !isVid && !isPdf) { err++; continue; }
    var endpoint = isVid ? '/api/upload-media' : '/api/upload-image';
    try {
      var r = await fetch(endpoint+'?name='+encodeURIComponent(file.name), {
        method: 'POST',
        headers: {'Content-Type': file.type || 'application/octet-stream'},
        body: file,
      });
      var data = await r.json();
      if (data.ok) ok++; else err++;
    } catch(e) { err++; }
  }
  fileInput.value = '';
  // Refresh media list in S.media
  try { var mr = await fetch('/api/media'); S.media = await mr.json(); } catch(e){}
  toast(ok+' subido'+(ok!==1?'s':'')+(err?' · '+err+' error'+(err!==1?'es':''):''), ok&&!err ? 'ok' : 'err');
  loadRecursos();
}

async function saveNewsPage() {
  var tipo = document.getElementById('nc-tipo').value;
  var cat = ncGetCat();
  var tituloEl = document.getElementById('nc-titulo');
  var titulo = tituloEl ? tituloEl.innerHTML.trim() : '';
  var tituloPlain = titulo.replace(/<[^>]+>/g,'');
  var slug = (S.newsFormData||{}).slug || document.getElementById('nc-slug').value.trim();
  var fechaLarga = document.getElementById('nc-fecha').value.trim();
  var fechaCorta = ncGetFechaCorta();
  var breadcrumb = document.getElementById('nc-breadcrumb').value.trim();
  var tituloSeo = document.getElementById('nc-seo').value.trim();
  var imgInput = document.getElementById('nc-img');
  var imgRaw = imgInput ? imgInput.value.trim() : '';
  var imagenAlt = document.getElementById('nc-img-alt').value.trim();
  var excerpt = document.getElementById('nc-excerpt').value.trim();
  var searchDesc = document.getElementById('nc-search-desc').value.trim();
  var contentBlocks = ncGetBlocks();
  var links = ncGetLinks('nc-links');
  var evTitulo = document.getElementById('nc-ev-titulo').value.trim();
  var evSubtitulo = document.getElementById('nc-ev-subtitulo').value.trim();
  var evFechas = document.getElementById('nc-ev-fechas').value.trim();
  var evLugar = document.getElementById('nc-ev-lugar').value.trim();
  var evLinks = ncGetLinks('nc-ev-links');

  var errors = [];
  if (!tituloPlain) errors.push('título');
  if (!fechaLarga || fechaCorta==='—') errors.push('fecha');
  if (!cat) errors.push('categoría');
  if (!excerpt) errors.push('extracto');
  if (!contentBlocks.length) errors.push('al menos un bloque de contenido');
  if (errors.length) { toast('Faltan campos: '+errors.join(', '),'err'); return; }

  var imgPath = '';
  if (imgRaw) {
    var imgFilename = imgRaw.replace(/^(\.\.\/)?media\//,'');
    imgPath = '../media/'+imgFilename;
  }

  var html = ncGenerateHtml({tipo,cat,titulo,tituloPlain,slug,fechaLarga,fechaCorta,breadcrumb,tituloSeo,imgPath,imagenAlt,excerpt,contentBlocks,links,evTitulo,evSubtitulo,evFechas,evLugar,evLinks,filename:S.currentPath.split('/').pop()});

  toast('Guardando…','info');
  try {
    var r = await fetch('/api/page?path='+encodeURIComponent(S.currentPath),{method:'POST',headers:{'Content-Type':'text/html; charset=utf-8'},body:html});
    var data = await r.json();
    if (!data.ok) { toast('Error al guardar: '+(data.error||''),'err'); return; }
  } catch(e) { toast('Error de conexión','err'); return; }

  // Update noticias-data.js entry
  try {
    var nr = await fetch('/api/page?path=noticias-data.js');
    var src = await nr.text();
    var newsArr = [];
    try { newsArr = new Function(src.replace(/\bconst\b/g,'var').replace(/\blet\b/g,'var')+';return typeof news!=="undefined"?news:[];')(); } catch(ex) {}
    var filename = S.currentPath.split('/').pop();
    var entry = newsArr.find(function(n){ return n.url===filename; });
    if (entry) {
      entry.cat = cat;
      entry.date = ncShortenDate(fechaLarga) || entry.date;
      entry.title = tituloPlain;
      entry.excerpt = excerpt;
      if (imgPath) entry.img = imgPath;
      var paras = contentBlocks.filter(function(b){ return b.type==='parrafo'; });
      entry.content = paras.map(function(b){ return b.text.replace(/<[^>]+>/g,''); });
      var allLinks = links.concat(tipo==='evento'?evLinks:[]);
      entry.links = allLinks;
      var newSrc = ncSerializeNoticiasData(newsArr);
      await fetch('/api/page?path=noticias-data.js',{method:'POST',headers:{'Content-Type':'application/javascript; charset=utf-8'},body:newSrc});
    }
  } catch(ex) { /* silent */ }

  // Update search-data.js
  try {
    var desc = (searchDesc||excerpt).replace(/"/g,'\\"');
    await fetch('/api/search-data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:'noticias/'+S.currentPath.split('/').pop(),content:desc})});
  } catch(ex) { /* silent */ }

  toast('Noticia guardada correctamente','ok');
  // Reload to reflect saved state
  setTimeout(function(){ loadPage(S.currentPath); }, 1000);
}

function ncShortenDate(fechaLarga) {
  var NC_MESES = {enero:'ene.',febrero:'feb.',marzo:'mar.',abril:'abr.',mayo:'may.',junio:'jun.',julio:'jul.',agosto:'ago.',septiembre:'sep.',octubre:'oct.',noviembre:'nov.',diciembre:'dic.'};
  var raw = (fechaLarga||'').trim().toLowerCase();
  if (!raw) return '';
  var corta = raw;
  for (var m in NC_MESES) corta = corta.replace(new RegExp(m,'gi'),NC_MESES[m]);
  corta = corta.replace(/ de /g,' ');
  return corta.charAt(0).toUpperCase()+corta.slice(1);
}

function ncSerializeNoticiasData(arr) {
  var lines = '// ── NEWS DATA (shared across noticias.html and individual news pages) ──\nconst news = [\n';
  arr.forEach(function(n,i){
    lines += '  {\n';
    lines += '    id: '+n.id+',\n';
    lines += "    cat: '"+escJs(n.cat||'')+"',\n";
    lines += "    date: '"+escJs(n.date||'')+"',\n";
    lines += "    title: '"+escJs(n.title||'')+"',\n";
    lines += "    excerpt: '"+escJs(n.excerpt||'')+"',\n";
    lines += "    img: '"+escJs(n.img||'')+"',\n";
    lines += "    url: '"+escJs(n.url||'')+"',\n";
    lines += '    content: [\n';
    (n.content||[]).forEach(function(c,ci){
      lines += "      '"+escJs(c)+"'"+(ci<(n.content.length-1)?',':'')+'\n';
    });
    lines += '    ],\n';
    lines += '    links: [\n';
    (n.links||[]).forEach(function(l,li){
      lines += "      { label: '"+escJs(l.label||'')+"', url: '"+escJs(l.url||'')+"' }"+(li<(n.links.length-1)?',':'')+'\n';
    });
    lines += '    ]\n';
    lines += '  }'+(i<arr.length-1?',':'')+'\n';
  });
  lines += '];\n';
  return lines;
}

function nmGetSorted() {
  var rows = NM.rows.filter(function(r){ return !NM.q || nmNorm(r.title).indexOf(NM.q)!==-1; });
  rows = rows.slice(); // copy
  if (NM.sort === 'recent') rows.sort(function(a,b){ return a.order - b.order; });
  else if (NM.sort === 'old') rows.sort(function(a,b){ return b.order - a.order; });
  else rows.sort(function(a,b){ return a.title.localeCompare(b.title,'es'); });
  return rows;
}

function nmRender() {
  var rows = nmGetSorted();
  var total = rows.length;
  var totalPages = Math.max(1, Math.ceil(total / NM.perPage));
  if (NM.page > totalPages) NM.page = totalPages;

      +'<button class="btn btn-blue btn-sm" onclick="loadPage(decodeURIComponent(this.dataset.path))" data-path="'+encodeURIComponent(r.path)+'" style="margin-right:.3rem">Editar</button>'
      +'<button class="btn btn-sm" style="background:var(--rojo);color:#fff" onclick="deleteNews(decodeURIComponent(this.dataset.path),decodeURIComponent(this.dataset.title))" data-path="'+encodeURIComponent(r.path)+'" data-title="'+encodeURIComponent(r.title)+'">Eliminar</button>'
      +'</td>';
    html += '</tr>';
  });
  if (tbody) tbody.innerHTML = html;

  // Pagination
  var pg = document.getElementById('nm-pagination');
  if (pg) {

async function deleteNews(pagePath, title) {
  var filename = pagePath.split('/').pop();
  if (!confirm('¿Eliminar la noticia «'+title+'»?\n\nEsta acción no se puede deshacer (aunque se guardará una copia de seguridad .bak).')) return;

  toast('Eliminando…', 'info');

  // 1. Delete the HTML file
  try {
    var r = await fetch('/api/delete-page?path='+encodeURIComponent(pagePath), {method:'POST'});
    var data = await r.json();
    if (!data.ok) { toast('Error al eliminar el archivo: '+(data.error||''), 'err'); return; }
  } catch(e) { toast('Error de conexión', 'err'); return; }

  // 2. Remove from noticias-data.js
  try {
    var nr = await fetch('/api/page?path=noticias-data.js');
    var src = await nr.text();
    var newsArr = [];
    try { newsArr = new Function(src.replace(/\bconst\b/g,'var').replace(/\blet\b/g,'var')+';return typeof news!=="undefined"?news:[];')(); } catch(ex) {}
    newsArr = newsArr.filter(function(n){ return n.url !== filename; });
    var newSrc = ncSerializeNoticiasData(newsArr);
    await fetch('/api/page?path=noticias-data.js', {method:'POST', headers:{'Content-Type':'application/javascript; charset=utf-8'}, body:newSrc});
  } catch(e) { /* silent */ }

  // 3. Remove from search-data.js (remove the entry with this url)
  try {
    var sr = await fetch('/api/page?path=search-data.js');
    var ssrc = await sr.text();
    // Remove the object literal for this url from the array
    var urlPattern = 'noticias/'+filename;
    var escaped = urlPattern.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // Match a full object entry {...} containing this url, with optional trailing comma
    var re = new RegExp('\\{[^{}]*?"url":\\s*"'+escaped+'"[^{}]*?\\},?\\s*\n?','s');
    var cleaned = ssrc.replace(re, '');
    if (cleaned !== ssrc) {
      await fetch('/api/page?path=search-data.js', {method:'POST', headers:{'Content-Type':'application/javascript; charset=utf-8'}, body:cleaned});
    }
  } catch(e) { /* silent */ }

  // 4. Refresh nav and reload manager
  try { var pr=await fetch('/api/pages'); S.pages=await pr.json(); renderNav(); } catch(e){}
  toast('Noticia «'+title+'» eliminada', 'ok');
  loadNewsManager();
}
